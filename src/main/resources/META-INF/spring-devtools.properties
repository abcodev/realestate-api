# Firebase Admin SDK를 base classloader에서 로드하도록 설정
# (devtools RestartClassLoader가 아닌 기본 ClassLoader 사용)
restart.include.firebase=/firebase-admin-.*\\.jar
restart.include.google-auth=/google-auth-.*\\.jar
restart.include.google-api=/google-api-.*\\.jar
restart.include.google-cloud=/google-cloud-.*\\.jar
restart.include.grpc=/grpc-.*\\.jar
restart.include.proto=/proto-.*\\.jar
restart.include.protobuf=/protobuf-.*\\.jar
